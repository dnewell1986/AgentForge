<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="#1a1a2e" stroke="#4f8ef7" stroke-width="3"/>

  <!-- Anvil body (forge) -->
  <rect x="28" y="72" width="72" height="20" rx="4" fill="#4f8ef7"/>
  <rect x="36" y="60" width="56" height="16" rx="3" fill="#3a7bd5"/>
  <!-- Anvil horn -->
  <path d="M36 68 Q22 68 22 76 L36 76 Z" fill="#3a7bd5"/>

  <!-- Agent head (circuit/robot) -->
  <rect x="44" y="22" width="40" height="34" rx="8" fill="#e8e8f0" stroke="#4f8ef7" stroke-width="2"/>
  <!-- Eyes — glowing dots -->
  <circle cx="56" cy="36" r="5" fill="#4f8ef7"/>
  <circle cx="72" cy="36" r="5" fill="#4f8ef7"/>
  <circle cx="56" cy="36" r="2.5" fill="#a8d0ff"/>
  <circle cx="72" cy="36" r="2.5" fill="#a8d0ff"/>
  <!-- Mouth — small terminal prompt -->
  <rect x="54" y="46" width="20" height="4" rx="2" fill="#4f8ef7" opacity="0.7"/>

  <!-- Neck connecting head to anvil -->
  <rect x="58" y="56" width="12" height="8" fill="#c8c8d8"/>

  <!-- Spark / lightning bolt above -->
  <path d="M80 10 L74 24 L80 22 L74 36" stroke="#f7c94f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
